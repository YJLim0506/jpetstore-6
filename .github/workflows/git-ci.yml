name: Java CI with Maven

# This tells GitHub WHEN to run this pipeline
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    # This creates a fresh, invisible Linux server (just like Docker does!)
    runs-on: ubuntu-latest

    steps:
    # Download your code from the GitHub repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Install Java 17 (Eclipse Temurin, matching the Dockerfile)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # This speeds up future runs by saving downloaded dependencies

    # Run the exact command you ran locally to compile and test
    - name: Build and Test
      run: mvn -B clean package

    # Save the test reports for download or reference
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always() # This forces it to save the report even if a test fails
      with:
        name: maven-test-reports
        path: |
          target/surefire-reports/
          target/site/jacoco/
